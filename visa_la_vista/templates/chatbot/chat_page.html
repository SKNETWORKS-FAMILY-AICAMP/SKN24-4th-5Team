{% extends "layout/base.html" %}
{% load static %}

{% block title %}입시 상담 챗봇{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'styles/chat_page.css' %}">
{% endblock %}

{% block content %}
<div id="chat-page" class="page active" data-assistant-icon="{% static 'images/icon.png' %}" data-chat-message-url="{% url 'chat_message_create' %}">
    {% include "layout/chat_sidebar.html" %}

    <div id="chat-main" class="chat-main">
        <div class="chat-header">
            <div class="chat-header-content">
                <div>
                    <h2 id="chat-title-display" class="chat-title">새 채팅</h2>
                </div>
            </div>
        </div>

        <div id="chat-messages" class="chat-messages"></div>

        <div id="chat-input-area" class="chat-input-area">
            <div class="chat-input-container">
                <form id="chat-form" class="chat-input-form">
                    <div class="input-wrapper">
                        <textarea id="message-input" placeholder="채팅을 입력하세요." rows="1" class="message-input"></textarea>
                        <button type="submit" class="btn-send" id="send-btn" aria-label="메시지 전송">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <line x1="22" y1="2" x2="11" y2="13" />
                                <polygon points="22 2 15 22 11 13 2 9 22 2" />
                            </svg>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{{ chat_page_data|json_script:"chat-page-data" }}
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/chat_page.js' %}"></script>
{% endblock %}
