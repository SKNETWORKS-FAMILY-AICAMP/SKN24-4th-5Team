{% load static %}

<header class="site-header">
  <div class="site-header__inner">
    <a class="brand" href="#" aria-label="Visa La Vista 홈">
      <img class="brand__mark" src="{% static 'images/icon.png' %}" alt="" aria-hidden="true" />
      <span class="brand__name">VISA LA VISTA</span>
    </a>

    <nav class="site-nav" aria-label="주요 메뉴">
      <a class="site-nav__link" href="#">입시 도우미</a>
      <a class="site-nav__link" href="#">모의 인터뷰</a>
      <a class="site-nav__link" href="#">이용 가이드</a>
    </nav>

    {% if user.is_authenticated %}
      <div class="profile-menu">
        <button class="profile-menu__button" type="button" aria-expanded="false" aria-haspopup="true">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
          </svg>
          <span class="profile-menu__initial">{{ user.username|first|default:"U" }}</span>
          <svg class="profile-menu__chevron" viewBox="0 0 24 24" aria-hidden="true">
            <path d="m6 9 6 6 6-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </button>

        <div class="profile-dropdown" role="menu">
          <div class="profile-dropdown__account">
            <p class="profile-dropdown__name">{{ user.username }}</p>
            <p class="profile-dropdown__email">{{ user.email|default:"이메일 미등록" }}</p>
          </div>

          <ul class="profile-dropdown__list">
            <li>
              <button class="profile-dropdown__item" type="button" role="menuitem">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28Z" />
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                </svg>
                <span>비밀번호 수정</span>
              </button>
            </li>
            <li>
              <button class="profile-dropdown__item" type="button" role="menuitem">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
                </svg>
                <span>회원 탈퇴하기</span>
              </button>
            </li>
          </ul>

          <ul class="profile-dropdown__list">
            <li>
              <button class="profile-dropdown__item profile-dropdown__item--danger" type="button" role="menuitem">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15m3 0 3-3m0 0-3-3m3 3H9" />
                </svg>
                <span>로그아웃</span>
              </button>
            </li>
          </ul>
        </div>
      </div>
    {% else %}
      <div class="header-actions">
        <a class="btn btn--ghost" href="#">로그인</a>
        <a class="btn btn--primary" href="#">회원가입</a>
      </div>
    {% endif %}
  </div>
</header>
