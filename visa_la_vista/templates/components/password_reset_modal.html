{% if not user.is_authenticated %}
  <div class="custom-modal-backdrop" id="passwordResetModal" role="dialog" aria-modal="true" aria-labelledby="passwordResetModalTitle" hidden>
    <div class="custom-modal auth-modal password-reset-modal" role="document">
      <button class="custom-modal-close" type="button" aria-label="비밀번호 찾기 창 닫기" data-modal-close>
        &times;
      </button>

      <div class="login-modal__header">
        <h2 class="login-modal__title" id="passwordResetModalTitle">비밀번호 찾기</h2>
      </div>

      <form class="login-modal__form" method="post" data-password-reset-form novalidate>
        {% csrf_token %}

        <div data-reset-step="verify">
          <div class="login-modal__field">
            <div class="login-modal__btns">
              <input type="email" class="form-control" name="email" id="modal-reset-email" autocomplete="email" required placeholder="이메일" data-reset-email>
              <button type="button" class="btn btn--secondary" data-reset-email-check>중복 확인</button>
            </div>
            <p class="feedback" data-reset-email-feedback></p>
          </div>

          <div class="login-modal__field">
            <div class="login-modal__btns">
              <div class="verification-input">
                <input type="text" class="form-control verification-input__control" name="reset_verify" id="modal-reset-verify" autocomplete="one-time-code" required placeholder="인증번호" data-reset-verification>
                <span class="verification-input__timer" data-reset-verification-timer aria-live="polite">4:32</span>
              </div>
              <button type="button" class="btn btn--secondary" data-reset-resend>재전송</button>
              <button type="button" class="btn btn--secondary" data-reset-verification-check>인증 확인</button>
            </div>
            <p class="feedback" data-reset-verification-feedback></p>
          </div>

          <div class="login-modal__actions">
            <button type="button" class="btn btn--primary login-modal__submit" data-reset-next>확인</button>
            <button type="button" class="btn btn--secondary login-modal__submit" data-modal-open="loginModal">취소</button>
          </div>
        </div>

        <div class="hidden" data-reset-step="password">
          <div class="login-modal__field">
            <input type="password" class="form-control" name="new_password" autocomplete="new-password" placeholder="새 비밀번호  (8~16자, 영어 대소문자, 숫자, 특수문자)" data-reset-password>
            <p class="feedback" data-reset-password-feedback></p>
          </div>

          <div class="login-modal__field">
            <input type="password" class="form-control" name="new_password_confirm" autocomplete="new-password" placeholder="새 비밀번호 확인" data-reset-password-confirm>
            <p class="feedback" data-reset-password-confirm-feedback></p>
          </div>

          <button type="submit" class="btn btn--primary login-modal__submit">확인</button>
        </div>
      </form>
    </div>
  </div>
{% endif %}
