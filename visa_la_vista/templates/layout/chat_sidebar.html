{% load static %}

<aside id="chat-sidebar" class="chat-sidebar open">
    <div class="sidebar-header">
        <h2 class="sidebar-title">입시 상담 챗봇</h2>
    </div>

    <div class="sidebar-conversations" id="conversations-list"></div>

    <div class="sidebar-footer">
        <button class="btn-new-chat" id="new-chat-btn" type="button">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="12" y1="5" x2="12" y2="19" />
                <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
            <span>새 채팅</span>
        </button>
    </div>
</aside>
