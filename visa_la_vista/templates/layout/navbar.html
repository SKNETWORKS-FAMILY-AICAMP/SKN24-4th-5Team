{% load static %}
<header id="header">
  <div class="header-container">
    <a href="/" class="logo" data-nav="home">
      <div class="logo-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
        </svg>
      </div>
      <span class="logo-text">Visa La Vista</span>
    </a>
    <nav class="nav">
      <a href="/" class="nav-link" id="nav-home">Home</a>
      <a href="/" class="nav-link" id="nav-home">Guide</a>
      {% if user.is_authenticated %}
      <a href="{% url 'uauth:logout' %}" class="nav-link">Logout</a>
      {% else %}
      <a href="{% url 'uauth:login' %}" class="nav-link">Login</a>
      <a href="{% url 'uauth:signup' %}" class="nav-link">Signup</a>
      {% endif %}

      <a href="{% url 'interview' %}" class="nav-link nav-button" id="nav-chat" data-nav="chat">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
        </svg>
        Start Interview
      </a>

      <a href="{% url 'chat' %}" class="nav-link nav-button" id="nav-chat" data-nav="chat">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
        </svg>
        Start Chat
      </a>

    </nav>
  </div>
</header>
