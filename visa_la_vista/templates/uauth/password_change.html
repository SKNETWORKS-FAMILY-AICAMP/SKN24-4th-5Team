{% extends "layout/base.html" %}
{% load static %}

{% block title %}비밀번호 수정{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'styles/account_pages.css' %}">
{% endblock %}

{% block content %}
<main class="account-page">
    <section class="account-workspace" aria-labelledby="passwordChangeTitle">
        <form class="account-card" method="post" action="{% url 'uauth:password_change' %}">
            {% csrf_token %}
            <h1 class="account-title" id="passwordChangeTitle">비밀번호 수정</h1>

            <div class="account-field">
                <input class="account-input" type="password" name="current_password" autocomplete="current-password" placeholder="현재 비밀번호" aria-describedby="currentPasswordError">
                <p class="account-error" id="currentPasswordError">{{ errors.current_password }}</p>
            </div>

            <div class="account-field">
                <input class="account-input" type="password" name="new_password" autocomplete="new-password" placeholder="새 비밀번호  (8~16자, 영어 대소문자, 숫자, 특수문자)" aria-describedby="newPasswordError">
                <p class="account-error" id="newPasswordError">{{ errors.new_password }}</p>
            </div>

            <div class="account-field">
                <input class="account-input" type="password" name="new_password_confirm" autocomplete="new-password" placeholder="새 비밀번호 확인" aria-describedby="newPasswordConfirmError">
                <p class="account-error" id="newPasswordConfirmError">{{ errors.new_password_confirm }}</p>
            </div>

            <div class="account-actions">
                <button class="account-button" type="submit">확인</button>
                <a class="account-button" href="{% url 'index' %}">취소</a>
            </div>
        </form>
    </section>
</main>
{% endblock %}
